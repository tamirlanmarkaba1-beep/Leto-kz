<style>
:root{--a1:#4f46e5;--a2:#7c3aed;--bg:#07050f;--bg2:#0f0c1f;--text:#e2e0f0;--muted:rgba(180,170,220,.45);--card:rgba(79,70,229,.08);--border:rgba(129,140,248,.18);}
[data-color="rose"]{--a1:#e11d48;--a2:#be123c;--border:rgba(251,113,133,.2);--card:rgba(225,29,72,.08);}
[data-color="amber"]{--a1:#d97706;--a2:#b45309;--border:rgba(251,191,36,.2);--card:rgba(217,119,6,.08);}
[data-color="teal"]{--a1:#0d9488;--a2:#0f766e;--border:rgba(45,212,191,.2);--card:rgba(13,148,136,.08);}
[data-color="green"]{--a1:#16a34a;--a2:#15803d;--border:rgba(74,222,128,.2);--card:rgba(22,163,74,.08);}
[data-color="pink"]{--a1:#db2777;--a2:#be185d;--border:rgba(244,114,182,.2);--card:rgba(219,39,119,.08);}
[data-theme="light"]{--bg:#f0eeff;--bg2:#e4e0ff;--text:#1e1a3f;--muted:rgba(80,70,140,.55);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100dvh;}
.mesh{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 50% at 15% 10%,color-mix(in srgb,var(--a1) 22%,transparent),transparent 60%),radial-gradient(ellipse 50% 40% at 85% 15%,color-mix(in srgb,var(--a2) 15%,transparent),transparent 55%),var(--bg);}
.stars{position:fixed;inset:0;z-index:1;pointer-events:none;}
.star{position:absolute;border-radius:50%;animation:tw var(--d,3s) ease-in-out infinite alternate;}
[data-theme="light"] .stars{display:none;}
@keyframes tw{from{opacity:.04}to{opacity:.5}}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;width:100%;overflow:hidden;}
body{display:flex;flex-direction:column;height:100dvh;width:100vw;}
.pages{flex:1;width:100%;overflow:hidden;}
.page{width:100%;}

<div style="z-index:200;display:flex;align-items:center;gap:3px;padding:7px 7px 0;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);overflow-x:auto;" class="tabbar">

<div style="display:flex;flex-direction:column;height:calc(100dvh - 56px);position:absolute;inset:0;overflow:hidden;" class="chat-wrap">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;padding:1.5rem;height:100%;text-align:center;" id="login-screen">
    <div style="width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;"><svg viewBox="0 0 24 24" style="width:26px;height:26px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>
    <div style="font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;">Добро пожаловать!</div>
    <div style="font-size:.73rem;color:var(--muted);max-width:260px;">Введи данные чтобы начать</div>
    <div style="width:66px;height:66px;border-radius:50%;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative;background:var(--card);"><img id="e-av-img" src="" style="display:none;"><svg id="e-av-ico" viewBox="0 0 24 24" style="width:22px;height:22px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/></svg><input type="file" accept="image/*" onchange="prevImgTo(event,'e-av-img','e-av-ico',80)" style="position:absolute;inset:0;opacity:0;cursor:pointer;"></div>
    <div style="width:100%;max-width:280px;display:flex;flex-direction:column;gap:.45rem;">
      <input style="background:var(--card);border:1px solid var(--border);border-radius:11px;padding:.52rem .78rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:none;width:100%;" id="e-username" placeholder="@юзернейм" maxlength="20">
      <input style="background:var(--card);border:1px solid var(--border);border-radius:11px;padding:.52rem .78rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.8rem;outline:none;width:100%;" id="e-name" placeholder="Отображаемое имя" maxlength="20">
      <button style="background:linear-gradient(135deg,var(--a1),var(--a2));border:none;border-radius:11px;padding:.52rem 1rem;color:#fff;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;" onclick="doLogin()">Войти →</button>
    </div>
  </div>
  <div style="display:none;flex-direction:column;height:100%;overflow:hidden;" id="chat-home">
    <div style="display:flex;align-items:center;gap:.45rem;padding:.5rem .9rem;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);">
      <div style="width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pdot 1.5s ease-in-out infinite;flex-shrink:0;"></div>
      <span style="font-size:.7rem;color:var(--muted);">Онлайн: <span style="font-weight:800;color:#4ade80;margin-left:2px;" id="on-count">—</span></span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:.35rem;">
        <div style="width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:.55rem;font-weight:800;color:#fff;overflow:hidden;" id="me-av-el"></div>
        <span style="font-size:.66rem;font-weight:700;color:var(--a1);" id="me-name-el"></span>
      </div>
    </div>
    <div style="display:flex;gap:.42rem;padding:.42rem .9rem;overflow-x:auto;border-bottom:1px solid var(--border);flex-shrink:0;" id="users-strip"></div>
    <div style="display:flex;gap:.35rem;padding:.38rem .9rem;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;">
      <div style="padding:.22rem .65rem;border-radius:999px;font-size:.65rem;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-color:transparent;flex-shrink:0;" class="cf active" onclick="setFilter('all',this)">Все</div>
      <div style="padding:.22rem .65rem;border-radius:999px;font-size:.65rem;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:var(--card);color:var(--muted);flex-shrink:0;" class="cf" onclick="setFilter('groups',this)">Группы</div>
      <div style="padding:.22rem .65rem;border-radius:999px;font-size:.65rem;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:var(--card);color:var(--muted);flex-shrink:0;" class="cf" onclick="setFilter('dms',this)">Личные</div>
      <div style="padding:.22rem .65rem;border-radius:999px;font-size:.65rem;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:var(--card);color:var(--muted);flex-shrink:0;" class="cf" onclick="setFilter('unread',this)">Непрочитанные</div>
    </div>
    <div style="flex:1;overflow-y:auto;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:.42rem .9rem .25rem;position:sticky;top:0;z-index:5;background:var(--bg2);"><span style="font-size:.56rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);">Группы</span><div style="display:flex;gap:.25rem;"><button style="font-size:.58rem;font-weight:700;background:var(--card);border:1px solid var(--border);color:var(--a1);border-radius:7px;padding:.2rem .52rem;cursor:pointer;" class="sec-btn" onclick="openM('m-join')">Войти</button><button style="font-size:.58rem;font-weight:700;background:var(--card);border:1px solid var(--border);color:var(--a1);border-radius:7px;padding:.2rem .52rem;cursor:pointer;" class="sec-btn" onclick="openM('m-group')">+ Создать</button></div></div>
      <div id="grp-list"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:.42rem .9rem .25rem;position:sticky;top:0;z-index:5;background:var(--bg2);"><span style="font-size:.56rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);">Личные сообщения</span></div>
      <div id="dm-list"></div>
    </div>
  </div>
  <div style="display:none;flex-direction:column;height:100%;position:absolute;inset:0;z-index:20;background:var(--bg);" id="chat-room">
    <div style="display:flex;align-items:center;gap:.58rem;padding:.55rem .82rem;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg2);">
      <div style="width:28px;height:28px;border-radius:8px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;" onclick="closeRoom()"><svg style="width:12px;height:12px;stroke:var(--a1);stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></div>
      <div style="width:30px;height:30px;border-radius:9px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.85rem;" id="r-hdr-av"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-family:'Syne',sans-serif;font-size:.8rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="r-hdr-name"></div>
        <div style="font-size:.58rem;color:var(--muted);" id="r-hdr-sub"></div>
      </div>
    </div>
    <div style="min-height:18px;padding:.15rem .78rem;font-size:.6rem;color:var(--muted);display:flex;align-items:center;gap:3px;" id="typing-row"></div>
    <div style="flex:1;overflow-y:auto;padding:.62rem .78rem;display:flex;flex-direction:column;gap:.35rem;" id="msgs"></div>
    <div style="display:flex;gap:.38rem;padding:.48rem .78rem;border-top:1px solid var(--border);flex-shrink:0;align-items:center;background:var(--bg2);" id="chat-bar">
      <div style="width:30px;height:30px;border-radius:9px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;position:relative;" class="att-btn"><svg style="width:12px;height:12px;stroke:var(--a1);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><input type="file" accept="image/*" onchange="sendChatImg(event)" style="position:absolute;inset:0;opacity:0;cursor:pointer;"></div>
      <input style="flex:1;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:.48rem .72rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.78rem;outline:none;" class="chat-inp" id="chat-inp" placeholder="Сообщение…" maxlength="500" onkeydown="if(event.key==='Enter')sendMsg()">
      <button style="background:linear-gradient(135deg,var(--a1),var(--a2));border:none;border-radius:11px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;" class="send-btn" onclick="sendMsg()"><svg style="width:13px;height:13px;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;fill:none;" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
    </div>
  </div>
</div>
</div>
</div>

<script>
const FB_CFG = {
  apiKey:"AIzaSyBlJ5x2lYIVuVL2qB0r4FX3a8zGe2SnFQk",
  authDomain:"do-leta-kz.firebaseapp.com",
  projectId:"do-leta-kz",
  storageBucket:"do-leta-kz.firebasestorage.app",
  messagingSenderId:"140919023504",
  appId:"1:140919023504:web:9306b083c3b91b7b42f515"
};
firebase.initializeApp(FB_CFG);
const db = firebase.firestore();

var DEV = 'Dev_tomato';
var SID = Math.random().toString(36).slice(2,10);
var uName='', uUsername='', uAv='';
let curRoom=null, curType=null, roomUnsub=null;
let unread={}, chatFilter='all';
var onlineUsers=[];

var AVC=['#4f46e5','#7c3aed','#2563eb','#0891b2','#059669','#d97706','#dc2626','#db2777'];
function nc(n){let h=0;for(const c of(n||'?'))h=(h*31+c.charCodeAt(0))%AVC.length;return AVC[h];}
function ni(n){return(n||'?')[0].toUpperCase();}
function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function pad(n){return String(n).padStart(2,'0');}

function mkAv(name,img,sz,radius){sz=sz||34;radius=radius||'50%';if(img)return`<img src="${img}" style="width:${sz}px;height:${sz}px;border-radius:${radius};object-fit:cover;">`;return`<div style="width:${sz}px;height:${sz}px;border-radius:${radius};background:${nc(name)};display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:${Math.round(sz*.38)}px;color:#fff;">${ni(name)}</div>`;}

function showToast(name,msg,av){const t=document.getElementById('toast');document.getElementById('t-av').innerHTML=mkAv(name,av,28);document.getElementById('t-name').textContent=name;document.getElementById('t-msg').textContent=msg;t.style.transform='translateX(-50%) translateY(0)';setTimeout(function(){t.style.transform='translateX(-50%) translateY(-80px)';},3500);}

function viewImg(src){document.getElementById('iv-img').src=src;document.getElementById('img-viewer').classList.add('open');}
function closeM(id){var el=document.getElementById(id);if(el)el.style.display='none';}
function openM(id){var el=document.getElementById(id);if(el)el.style.display='flex';}
function SP(i){document.querySelectorAll('[id^="page-"]').forEach(function(p,j){p.style.display=i===j?'flex':'none';});}

function prevImgTo(e,imgId,icoId,maxSize){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){const img=new Image();img.onload=function(){const c=document.createElement('canvas');const M=maxSize||200;let w=img.width,h=img.height;if(w>h){if(w>M){h=h*M/w;w=M;}}else{if(h>M){w=w*M/h;h=M;}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);const pi=document.getElementById(imgId);const ic=document.getElementById(icoId);if(pi){pi.src=c.toDataURL('image/jpeg',.75);pi.style.display='block';}if(ic)ic.style.display='none';};img.src=ev.target.result;};r.readAsDataURL(f);}

function compressImg(file,maxSize,quality,cb){const r=new FileReader();r.onload=function(ev){const img=new Image();img.onload=function(){const c=document.createElement('canvas');const M=maxSize||200;let w=img.width,h=img.height;if(w>h){if(w>M){h=h*M/w;w=M;}}else{if(h>M){w=w*M/h;h=M;}}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',quality||.75));};img.src=ev.target.result;};r.readAsDataURL(file);}

function ping(){if(!uUsername)return;db.collection('presence').doc(SID).set({name:uName,username:uUsername,avatar:uAv,t:firebase.firestore.FieldValue.serverTimestamp(),active:true});}
window.addEventListener('beforeunload',function(){db.collection('presence').doc(SID).set({active:false,t:firebase.firestore.FieldValue.serverTimestamp()});});

db.collection('presence').onSnapshot(function(snap){const now=Date.now();onlineUsers=[];const seen=new Set();snap.forEach(function(d){const v=d.data();if(v.active&&v.username&&v.t&&(now-v.t.toMillis())<70000&&!seen.has(v.username)){seen.add(v.username);onlineUsers.push({name:v.name||v.username,username:v.username,avatar:v.avatar||''});}});const el=document.getElementById('on-count');if(el)el.textContent=onlineUsers.length;renderDMs();});

function doLogin(){const rawU=(document.getElementById('e-username').value||'').trim().replace(/^@/,'');const rawN=(document.getElementById('e-name').value||'').trim();if(!rawU||!rawN){alert('Заполни все поля!');return;}uUsername=rawU;uName=rawN;const avEl=document.getElementById('e-av-img');if(avEl&&avEl.src&&avEl.src.startsWith('data:')){uAv=avEl.src;}else{uAv=localStorage.getItem('av-'+uUsername)||'';}localStorage.setItem('username',uUsername);localStorage.setItem('name-'+uUsername,uName);if(uAv)localStorage.setItem('av-'+uUsername,uAv);startApp();}

(function(){const su=localStorage.getItem('username');if(su){uUsername=su;uName=localStorage.getItem('name-'+su)||su;uAv=localStorage.getItem('av-'+su)||'';startApp();}})();

function updateMeUI(){const el=document.getElementById('me-av-el');if(el){if(uAv){el.innerHTML=`<img src="${uAv}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;}else{el.textContent=ni(uName);el.style.background=nc(uName||'?');}}const nl=document.getElementById('me-name-el');if(nl)nl.textContent=uName;}

function startApp(){document.getElementById('login-screen').style.display='none';document.getElementById('chat-home').style.display='flex';updateMeUI();ping();setInterval(ping,20000);listenGroups();listenDMs();}

function renderGroups(groups){const list=document.getElementById('grp-list');if(!list)return;list.innerHTML='';const show=chatFilter==='dms'?[]:groups;if(!show.length){list.innerHTML='<div style="padding:.5rem .9rem;font-size:.7rem;color:var(--muted);">Нет групп</div>';return;}show.forEach(function(g){const el=document.createElement('div');el.style.cssText='display:flex;align-items:center;gap:.62rem;padding:.62rem .9rem;border-bottom:1px solid rgba(129,140,248,.05);cursor:pointer;';el.innerHTML='<div style="width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--a1),var(--a2));font-size:1rem;display:flex;align-items:center;justify-content:center;">'+( g.icon||'💬' )+'</div><div style="flex:1;min-width:0;"><div style="font-size:.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(g.name)+'</div><div style="font-size:.65rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;">'+((g.members||[]).length)+' участников</div></div>';const gData=g;el.onclick=function(){openRoom(gData.id,'group',gData.name,gData.icon||'💬',gData.avatar||'',gData);};list.appendChild(el);});}

var grpUnsub=null;
function listenGroups(){if(grpUnsub)grpUnsub();grpUnsub=db.collection('groups').onSnapshot(function(snap){const myG=[];snap.forEach(function(d){const g=d.data();if((g.members||[]).indexOf(uUsername)>=0)myG.push(Object.assign({id:d.id},g));});renderGroups(myG);});}

function dmId(a,b){return[a,b].sort().join('__');}

function renderDMs(){const list=document.getElementById('dm-list');if(!list)return;list.innerHTML='';if(chatFilter==='groups')return;db.collection('friends').where('users','array-contains',uUsername).get().then(function(snap){list.innerHTML='';snap.forEach(function(d){const v=d.data();const friend=v.users.find(function(u){return u!==uUsername;});const fn=v.names?v.names[friend]||friend:friend;const fa=v.avatars?v.avatars[friend]||'':'';const rid=dmId(uUsername,friend);const isOn=onlineUsers.some(function(u){return u.username===friend;});const el=document.createElement('div');el.style.cssText='display:flex;align-items:center;gap:.62rem;padding:.62rem .9rem;border-bottom:1px solid rgba(129,140,248,.05);cursor:pointer;';el.innerHTML='<div style="width:40px;height:40px;border-radius:50%;background:'+nc(fn)+';display:flex;align-items:center;justify-content:center;font-family:\'Syne\',sans-serif;font-weight:800;color:#fff;font-size:.88rem;">'+( fa?'<img src="'+fa+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">':ni(fn) )+'</div><div style="flex:1;min-width:0;"><div style="font-size:.8rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(fn)+'</div><div style="font-size:.65rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;">'+( isOn?'🟢 Онлайн':'⚫ Не в сети')+'</div></div>';const ff=friend,ffn=fn,ffa=fa;el.onclick=function(){openRoom(rid,'dm',ffn,'',ffa,null);};list.appendChild(el);});});}

function openRoom(roomId,type,name,icon,avatar,grpData){curRoom=roomId;curType=type;const av=document.getElementById('r-hdr-av');if(avatar){av.innerHTML=`<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:${type==='group'?'9px':'50%'};">`;}else if(type==='group'){av.style.background='linear-gradient(135deg,var(--a1),var(--a2))';av.style.borderRadius='9px';av.innerHTML=icon;}else{av.style.background=nc(name);av.style.borderRadius='50%';av.style.color='#fff';av.style.fontFamily="'Syne',sans-serif";av.style.fontWeight='800';av.style.fontSize='.82rem';av.innerHTML=ni(name);}document.getElementById('r-hdr-name').textContent=name;document.getElementById('r-hdr-sub').textContent=type==='group'?'👥 Группа':'💬 Личные сообщения';document.getElementById('chat-home').style.display='none';document.getElementById('chat-room').style.display='flex';if(roomUnsub)roomUnsub();const col=type==='group'?'groups/'+roomId+'/messages':'dms/'+roomId+'/messages';roomUnsub=db.collection(col).orderBy('t','asc').limit(100).onSnapshot(function(snap){const el=document.getElementById('msgs');el.innerHTML='';if(snap.empty){el.innerHTML='<div style="text-align:center;font-size:.6rem;color:var(--muted);padding:.2rem;font-style:italic;">Сообщений пока нет 👋</div>';return;}var lastN='';snap.forEach(function(d){const v=d.data();const msgId=d.id;if(v.system){const s=document.createElement('div');s.style.cssText='text-align:center;font-size:.6rem;color:var(--muted);padding:.2rem;font-style:italic;';s.textContent=v.text;el.appendChild(s);lastN='';return;}const isMe=v.username===uUsername;const div=document.createElement('div');div.style.cssText='display:flex;flex-direction:column;gap:1px;max-width:80%;'+(isMe?'align-self:flex-end;align-items:flex-end;':'align-self:flex-start;');const time=v.t?new Date(v.t.toMillis()).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}):'';var content='';if(v.image)content+=`<img style="max-width:200px;border-radius:9px;cursor:pointer;display:block;margin-top:2px;" src="${v.image}" onclick="viewImg('${v.image}')">`;if(v.text){content+='<div>'+esc(v.text)+'</div>';}const showN=!isMe&&v.name!==lastN;div.innerHTML=(showN?'<div style="font-size:.53rem;color:var(--muted);font-weight:700;padding:0 .3rem;">'+esc(v.name||'')+'</div>':'')+'<div style="padding:.42rem .68rem;border-radius:12px;font-size:.78rem;line-height:1.4;word-break:break-word;'+(isMe?'background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border-bottom-right-radius:3px;':'background:var(--card);border:1px solid var(--border);border-bottom-left-radius:3px;')+'">'+content+'</div><div style="font-size:.5rem;color:var(--muted);padding:0 .3rem;">'+time+'</div>';el.appendChild(div);lastN=v.name||'';});el.scrollTop=el.scrollHeight;});db.collection('typing').doc(roomId).onSnapshot(function(s){const r=document.getElementById('typing-row');if(!r)return;const d=s.data();if(d&&d.username&&d.username!==uUsername&&(Date.now()-(d.t?d.t.toMillis():0))<3500){r.innerHTML=`<div style="width:5px;height:5px;border-radius:50%;background:var(--muted);animation:tb .8s ease-in-out infinite;"></div><div style="width:5px;height:5px;border-radius:50%;background:var(--muted);animation:tb .8s ease-in-out infinite;animation-delay:.15s;"></div><div style="width:5px;height:5px;border-radius:50%;background:var(--muted);animation:tb .8s ease-in-out infinite;animation-delay:.3s;"></div><span style="margin-left:3px;">${esc(d.name)} печатает…</span>`;}else r.innerHTML='';});}

function closeRoom(){if(roomUnsub){roomUnsub();roomUnsub=null;}curRoom=null;curType=null;document.getElementById('chat-room').style.display='none';document.getElementById('chat-home').style.display='flex';}

var chatTypingTO=null;
document.addEventListener('DOMContentLoaded',function(){var inp=document.getElementById('chat-inp');if(inp){inp.addEventListener('input',function(){if(!curRoom||!uUsername)return;clearTimeout(chatTypingTO);db.collection('typing').doc(curRoom).set({username:uUsername,name:uName,t:firebase.firestore.FieldValue.serverTimestamp()});chatTypingTO=setTimeout(function(){db.collection('typing').doc(curRoom).set({username:'',name:'',t:firebase.firestore.FieldValue.serverTimestamp()});},2500);});}});

function sendMsg(){if(!curRoom||!uUsername)return;const inp=document.getElementById('chat-inp');const text=(inp.value||'').trim();if(!text)return;inp.value='';const col=curType==='group'?'groups/'+curRoom+'/messages':'dms/'+curRoom+'/messages';db.collection(col).add({name:uName,username:uUsername,avatar:uAv,text:text,t:firebase.firestore.FieldValue.serverTimestamp()}).catch(function(e){alert('Ошибка: '+e.message);});db.collection('typing').doc(curRoom).set({username:'',name:'',t:firebase.firestore.FieldValue.serverTimestamp()});}

function sendChatImg(e){const f=e.target.files[0];if(!f||!curRoom)return;compressImg(f,600,.75,function(data){const col=curType==='group'?'groups/'+curRoom+'/messages':'dms/'+curRoom+'/messages';db.collection(col).add({name:uName,username:uUsername,avatar:uAv,image:data,text:'',t:firebase.firestore.FieldValue.serverTimestamp()});});e.target.value='';}

function setFilter(f,el){chatFilter=f;document.querySelectorAll('.cf').forEach(function(c){c.style.background='var(--card)';c.style.color='var(--muted)';c.style.borderColor='var(--border)';});el.style.background='linear-gradient(135deg,var(--a1),var(--a2))';el.style.color='#fff';el.style.borderColor='transparent';listenGroups();renderDMs();}

@keyframes tb{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
</script>

</body>
</html>
